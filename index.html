<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<title>Linux Terminal Emulator</title>


<style>

html,body{

    margin:0;
    padding:0;

    background:black;
    color:white;

    font-family:
    "Courier New",
    monospace;

    height:100%;

}


#terminal{

    padding:15px;

    height:100vh;

    box-sizing:border-box;

    overflow-y:auto;

    white-space:pre-wrap;

}


.line{

    display:flex;

}


.prompt{

    white-space:pre;

}


input{

    background:black;

    color:white;

    border:none;

    outline:none;

    font-family:
    "Courier New",
    monospace;

    flex:1;

}



img{

    max-width:350px;

    max-height:350px;

    border:1px solid white;

    margin-top:10px;

}


</style>


</head>


<body>


<div id="terminal"></div>



<script>


let terminal =
document.getElementById("terminal");



let isRoot=false;



let database =
JSON.parse(
localStorage.getItem("linuxIDs")
||
"{}"
);



function saveDB(){

localStorage.setItem(
"linuxIDs",
JSON.stringify(database)
);

}



function print(text=""){


let div=document.createElement("div");

div.textContent=text;

terminal.appendChild(div);


terminal.scrollTop=
terminal.scrollHeight;


}




function printImage(src){


let img=document.createElement("img");

img.src=src;


terminal.appendChild(img);


}



function requireRoot(){


if(!isRoot){

print(
"Permission denied: root required."
);

return false;

}


return true;

}




function createInput(){


let line=
document.createElement("div");


line.className="line";



let prompt=
document.createElement("span");



prompt.className="prompt";



prompt.textContent=
isRoot
?
"root@linux:~# "
:
"user@linux:~$ ";



let input=
document.createElement("input");



line.appendChild(prompt);

line.appendChild(input);



terminal.appendChild(line);



input.focus();



input.addEventListener(
"keydown",
function(e){


if(e.key==="Enter"){


let command=input.value.trim();



input.remove();



let text=
document.createElement("span");

text.textContent=command;


line.appendChild(text);



execute(command);


}


}

);


}




function uploadImage(id){



if(!database[id]){


print(
"ID not found."
);

return;

}



let fileInput=
document.createElement("input");



fileInput.type="file";

fileInput.accept="image/*";



fileInput.onchange=function(e){


let file=
e.target.files[0];



let reader=
new FileReader();



reader.onload=function(){


database[id].image=
reader.result;



saveDB();



print(
"Image attached."
);



};



reader.readAsDataURL(file);



};



fileInput.click();



}




function execute(cmd){


let args=
cmd.split(" ");



let command=args[0];



switch(command){



case "su":


if(args[1]==="PASSWORD"){


isRoot=true;

print(
"Root access granted."
);


}
else{

print(
"Wrong password."
);

}


break;




case "addid":



if(!requireRoot())
break;



if(args.length<5){


print(
"Usage: addid <ID> <x> <y> <z>"
);


break;


}



let newID=args[1];



if(database[newID]){


print(
"ID already exists."
);


break;


}




database[newID]={


x:args[2],

y:args[3],

z:args[4],

image:null


};



saveDB();



print(
"ID added."
);



break;





case "upload":



if(!requireRoot())
break;



if(!args[1]){


print(
"Usage: upload <ID>"
);


break;


}



uploadImage(args[1]);



break;



case "help":

print(
`su
addid
upload
id
removeid
listid
fastfetch
clear
sudo
help`
);

break;


case "id":



let id=args[1];



if(!database[id]){


print(
"ID not found."
);


break;


}




let data=
database[id];



print(
`ID: ${id}

X: ${data.x}
Y: ${data.y}
Z: ${data.z}`
);



if(data.image)
printImage(data.image);



delete database[id];

saveDB();



print(
"ID removed from database."
);



break;






case "removeid":



if(!requireRoot())
break;



if(!database[args[1]]){


print(
"ID not found."
);


break;


}



delete database[args[1]];


saveDB();



print(
"Removed."
);



break;







case "listid":



if(!requireRoot())
break;



let ids=
Object.keys(database);



if(ids.length===0){


print(
"Database empty."
);


break;


}




ids.forEach(id=>{


let d=
database[id];


print(
`${id}: X=${d.x} Y=${d.y} Z=${d.z}`
);


});


break;







case "fastfetch":



print(`                                                   
                                                   
                 ████████████                      
             ███████████████████                   
          █████████                                
        ███████                                    
       ██████         █████                        
     ██████ ███    ███████████     ████████        
    ██████ █████  ████████████████████████         
   ██████  ███   ███████████████████               
   █████   █     ███████████████     ████          
  ██████ █████    █████████████   █████████        
  ██████████████   ███████████                     
  █████ ███  █      █████████                █     
  █████ ██          █████████                ██    
  █████ ████      ██████████████            ███    
   ███████████████████████████████████████████     
   ███████ ███████████████████████████████████     
    ██████████████████████████████████████████     
     ███████████████████████    █████████████      
     ███████████████     ████ ██████████████       
       ████████ ██████████████████  ███████        
         ████████████████████████████████          
           ████████████████████████████            
             ████████████████████████              
                 ████████████████                  

`);
        
print(`\nImpulseOS - ver-0.001-ALPHA`);
print(`\nИнтересно, да?`);
setTimeout(() => {
}, 3000);
print(`\n.`);
setTimeout(() => {
}, 3000);
print(`\n.`);
setTimeout(() => {
}, 3000);
print(`\n.`);
setTimeout(() => {
}, 3000);
print(`\nОбычный HTML-файл, хе :3`);

break;



case "sudo":

setTimeout(()=>{


window.location.href=
"https://плюс.space";


},700);



break;



case "clear":



terminal.innerHTML="";


break;






default:



if(command!==""){


print(
command+
": command not found"
);


}



}



createInput();



}

terminal.innerHTML="";


let boot=[

"BIOS v3.7.2",

},80);

</script>


</body>

</html>
